services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    container_name: keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_pass
      KC_SMTP_HOST: smtp.gmail.com
      KC_SMTP_PORT: 465
      KC_SMTP_FROM: pranavpawale913@gmail.com
      KC_SMTP_AUTH: true
      KC_SMTP_USER: pranavpawale913@gmail.com
      KC_SMTP_PASSWORD:  tfwnouiuyoscdpol
      KC_SMTP_SSL: true
      KC_SPI_EMAIL_SMTP_STARTTLS: false
    ports:
      - "8080:8080"
    depends_on:
      - keycloak-db
    networks:
      - app-network

  keycloak-db:
    image: postgres:15
    container_name: keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_pass
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks:
      - app-network

volumes:
  keycloak_db_data:

networks:
  app-network:
    driver: bridge